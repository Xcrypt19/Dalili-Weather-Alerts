services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dalili
      POSTGRES_PASSWORD: dalili
      POSTGRES_DB: dalili
    ports:
      - '5432:5432'
    volumes:
      - dalili_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dalili']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://dalili:dalili@db:5432/dalili
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      # Fill these in to enable real providers:
      TOMORROW_API_KEY: ${TOMORROW_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-none}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - '4000:4000'
    command: sh -c "npm run migrate && npm start"

  web:
    build: ./client
    depends_on:
      - api
    environment:
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
      VITE_API_BASE: http://localhost:4000/api
    ports:
      - '5173:5173'

volumes:
  dalili_pgdata:
